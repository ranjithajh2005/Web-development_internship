<!DOCTYPE html>
<html>
<head>
  <title>Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      width: 350px;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #6c63ff;
      outline: none;
    }
    .error {
      color: red;
      font-size: 13px;
      display: block;
      margin-top: -5px;
      margin-bottom: 10px;
    }
    .checkbox-group {
      margin: 10px 0;
    }
    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 15px;
    }
    input[type="submit"]:hover {
      background: #574b90;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Registration Page</h2>
    <form id="regForm">
      <label>Username:</label>
      <input type="text" id="username">
      <span id="userError" class="error"></span>

      <label>Email:</label>
      <input type="text" id="email">
      <span id="emailError" class="error"></span>

      <label>Password:</label>
      <input type="password" id="password">
      <span id="passError" class="error"></span>

      <label>Confirm Password:</label>
      <input type="password" id="confirmPassword">
      <span id="confirmError" class="error"></span>

      <div class="checkbox-group">
        <input type="checkbox" id="terms"> I accept the Terms & Conditions
        <span id="termsError" class="error"></span>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="newsletter"> Subscribe to Newsletter
      </div>

      <input type="submit" value="Register">
    </form>
  </div>

  <script>
    document.getElementById("regForm").addEventListener("submit", function(e) {
      e.preventDefault(); 
      let valid = true;

      document.querySelectorAll(".error").forEach(el => el.textContent = "");

      if (document.getElementById("username").value === "") {
        document.getElementById("userError").textContent = "Username required";
        valid = false;
      }

      let email = document.getElementById("email").value;
      let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
      if (!email.match(emailPattern)) {
        document.getElementById("emailError").textContent = "Invalid email";
        valid = false;
      }

      let password = document.getElementById("password").value;
      if (password.length < 6) {
        document.getElementById("passError").textContent = "Min 6 characters";
        valid = false;
      }

      if (password !== document.getElementById("confirmPassword").value) {
        document.getElementById("confirmError").textContent = "Passwords do not match";
        valid = false;
      }

      if (!document.getElementById("terms").checked) {
        document.getElementById("termsError").textContent = "You must accept Terms & Conditions";
        valid = false;
      }

      if (valid) {
        alert("Registration successful!");
      }
    });
  </script>
</body>
</html>
