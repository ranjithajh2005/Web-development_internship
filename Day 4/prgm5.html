<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadget Store</title>

    <!-- Embedded CSS -->
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        /* Header */
        header{
            background:#222;
            color:white;
            padding:20px;
            text-align:center;
        }

        /* Navigation */
        nav{
            background:#444;
            padding:12px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
            font-size:18px;
        }

        nav a:hover{
            color:yellow;
        }

        /* Layout */
        .container{
            display:grid;
            grid-template-columns: 1fr 3fr;
            gap:20px;
            padding:20px;
        }

        /* Sidebar */
        .sidebar{
            background:white;
            padding:20px;
            border-radius:10px;
        }

        .sidebar h2{
            margin-bottom:15px;
            color:#333;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        /* Products */
        .products{
            display:grid;
            grid-template-columns: repeat(3,1fr);
            gap:20px;
        }

        .product-card{
            background:white;
            padding:15px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
        }

        .product-card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:10px;
        }

        .product-card h3{
            margin:10px 0;
        }

        .product-card p{
            color:green;
            font-size:18px;
            margin-bottom:10px;
        }

        .product-card button{
            background:#222;
            color:white;
            border:none;
            padding:10px 15px;
            cursor:pointer;
            border-radius:5px;
        }

        .product-card button:hover{
            background:orange;
        }

        /* Footer */
        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:20px;
        }

        /* Responsive */
        @media(max-width:768px){
            .container{
                grid-template-columns:1fr;
            }

            .products{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Smart Gadget Store</h1>
        <p>Latest Electronic Gadgets</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main Layout -->
    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Categories</h2>
            <ul>
                <li>Mobile Phones</li>
                <li>Laptops</li>
                <li>Smart Watches</li>
                <li>Headphones</li>
                <li>Cameras</li>
            </ul>
        </aside>

        <!-- Products -->
        <section class="products">

            <div class="product-card">
                <img src="https://images.pexels.com/photos/21325155/pexels-photo-21325155.jpeg" alt="Laptop">
                <h3>Gaming Laptop</h3>
                <p>₹75,000</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://images.pexels.com/photos/4982698/pexels-photo-4982698.jpeg" alt="Phone">
                <h3>Smart Phone</h3>
                <p>₹25,000</p>
                <button>Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://images.pexels.com/photos/13061155/pexels-photo-13061155.jpeg" alt="Watch">
                <h3>Smart Watch</h3>
                <p>₹5,000</p>
                <button>Buy Now</button>
            </div>

        </section>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Gadget Store | Designed with HTML & CSS</p>
    </footer>

</body>
</html>
